# OQ47-v1
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # OQ-SEC01: bloqueia backups/arquivos sensiveis no docroot publico
    location ~* \.(bak|backup|old|orig|swp|log|env|sql|sqlite|cjs|mjs)([.-].*)?$ {
        deny all;
        return 404;
    }
    location ~ /\. {
        deny all;
        return 404;
    }



    # [CTXCLEANURL01 2026-07-14] URL limpa do cockpit: a raiz EXATA serve o
    # dashboard.html direto (sem redirect, sem alias). Match exato '= /' vence
    # o 'location /' abaixo por precedencia do nginx. dashboard.html se
    # auto-protege: sem token faz replace('/index.html'). '/dashboard.html'
    # segue servido pelo catch-all (bookmarks intactos). NAO toca /projects/
    # (outro container, resolvido no proxy antes de chegar aqui).
    location = / {
        add_header Cache-Control "no-cache" always;
        try_files /dashboard.html =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    # [R10-HTMLNOCACHE 2026-07-15] HTML sempre revalida antes de reusar o cache.
    # Sem isso o browser aplicava cache heuristico e podia repintar um
    # dashboard.html VELHO (flash "correto->antigo" no icone do Perfil). Assets
    # com hash de conteudo no nome (island) seguem cacheados 7d abaixo — sao
    # imutaveis, o busting vem do filename mudar. Ver scripts/build-island.sh.
    location ~* \.html$ {
        add_header Cache-Control "no-cache" always;
        try_files $uri =404;
    }

    location ~* \.(?:css|js|png|jpg|jpeg|gif|svg|ico|woff2?|ttf|webp)$ {
        expires 7d;
        access_log off;
        try_files $uri =404;
    }
}
