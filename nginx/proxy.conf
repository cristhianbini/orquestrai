resolver 127.0.0.11 valid=10s ipv6=off;

server {
    listen 80;
    server_name orquestrai.cbini.com.br;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }

    # >>> OQ-58d LAVE CORS+SSE >>>
    set $cors_ok '';
    if ($http_origin ~* ^https://([a-z0-9-]+\.)?(lovableproject\.com|lovable\.app|lovable\.dev)$) { set $cors_ok 'yes'; }
    # B12_OQTERM_HEALTH
    location = /api/oqterm/health {
        proxy_pass http://172.18.0.1:7654/healthz;
        proxy_http_version 1.1;
        proxy_set_header Host 172.18.0.1:7654;
        proxy_connect_timeout 3s;
        proxy_read_timeout 3s;
        add_header Cache-Control "no-store" always;
    }
    location ^~ /api/term/ws {
        proxy_pass http://172.18.0.1:7654;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host 172.18.0.1:7654;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }


    location ~ ^/api/blocos/[^/]+/stream$ {
        proxy_pass http://api:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Authorization $http_authorization;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 24h;
        chunked_transfer_encoding on;
        add_header X-Accel-Buffering no always;
        if ($cors_ok = 'yes') { add_header Access-Control-Allow-Origin $http_origin always; }
        add_header Access-Control-Allow-Credentials true always;
    }
    location ^~ /api/blocos {
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin $http_origin always;
            add_header Access-Control-Allow-Methods 'GET, POST, PUT, DELETE, OPTIONS' always;
            add_header Access-Control-Allow-Headers 'Authorization, Content-Type, Accept, X-Requested-With' always;
            add_header Access-Control-Max-Age 86400 always;
            add_header Content-Length 0;
            return 204;
        }
        proxy_pass http://api:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Authorization $http_authorization;
        if ($cors_ok = 'yes') { add_header Access-Control-Allow-Origin $http_origin always; }
        add_header Access-Control-Allow-Credentials true always;
    }
    # <<< OQ-58d LAVE CORS+SSE <<<
}

server {
    listen 443 ssl http2;
    server_name orquestrai.cbini.com.br;

    ssl_certificate /etc/letsencrypt/live/orquestrai.cbini.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/orquestrai.cbini.com.br/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript application/xml+rss image/svg+xml;

    # >>> OQ-67a21 WS canonical >>>
    # B13_OQTERM_HEALTH
    location = /api/oqterm/health {
        proxy_pass http://172.18.0.1:7654/healthz;
        proxy_http_version 1.1;
        proxy_set_header Host 172.18.0.1:7654;
        proxy_connect_timeout 3s;
        proxy_read_timeout 3s;
        add_header Cache-Control "no-store" always;
    }
    location = /api/term/ws {
        limit_req zone=oq_term burst=15 nodelay;  # B28_TERM_RL
        proxy_pass http://172.18.0.1:7654;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host 172.18.0.1:7654;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_read_timeout 24h;
        proxy_send_timeout 24h;
    }
    # <<< OQ-67a21 WS canonical <<<

    # B28_AUTH_RL — rate-limit para endpoints de autenticacao
    location ^~ /api/auth/ {
        limit_req zone=oq_auth burst=20 nodelay;
        set $upstream_api http://orquestrai-api:3000;
        proxy_pass $upstream_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    location /api/ {
        set $upstream_api http://orquestrai-api:3000;
        proxy_pass $upstream_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }
location / {
        set $upstream_web http://orquestrai-web:80;
        proxy_pass $upstream_web;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    error_page 502 503 504 /50x.html;
    location = /50x.html {
        return 502 "upstream temporariamente indisponivel";
    }
}
