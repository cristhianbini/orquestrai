# OQ47-v1
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # OQ-SEC01: bloqueia backups/arquivos sensiveis no docroot publico
    location ~* \.(bak|backup|old|orig|swp|log|env|sql|sqlite|cjs|mjs)([.-].*)?$ {
        deny all;
        return 404;
    }
    location ~ /\. {
        deny all;
        return 404;
    }



    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(?:css|js|png|jpg|jpeg|gif|svg|ico|woff2?|ttf|webp)$ {
        expires 7d;
        access_log off;
        try_files $uri =404;
    }
}
